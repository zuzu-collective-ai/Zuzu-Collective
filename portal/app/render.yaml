# One-click Render deploy for the Zuzu portal app.
#
# When the repo is connected to Render, Render auto-detects this file
# and provisions a free Web Service + a free Postgres instance, links
# them with DATABASE_URL, and starts the app. No manual config.

services:
  - type: web
    name: zuzu-portal
    runtime: node
    rootDir: portal/app
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zuzu-portal-db
          property: connectionString

databases:
  - name: zuzu-portal-db
    plan: free
    databaseName: zuzu_portal
    user: zuzu

# One-click Render deploy for the Zuzu portal app.
#
# When the repo is connected to Render, Render auto-detects this file
# and provisions a free Web Service + a free Postgres instance, links
# them with DATABASE_URL, and starts the app. No manual config.

services:
  - type: web
    name: zuzu-portal
    runtime: node
    rootDir: portal/app
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zuzu-portal-db
          property: connectionString
      # Signing secret for admin session cookies. Render generates once
      # at provision time and never rotates on its own.
      - key: SESSION_SECRET
        generateValue: true
      # Single admin password. `sync: false` means Render won't put this
      # in the blueprint — it prompts in the dashboard on first deploy.
      # Change anytime via Settings → Environment.
      - key: ADMIN_PASSWORD
        sync: false
      # Anthropic API key — powers all AI features (budget allocator,
      # palette generator, checklist generator, vendor outreach). Optional:
      # without it the AI buttons are disabled, the rest of the app works.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Random salt for portal analytics IP hashing. Render auto-generates
      # a value; or set your own with `openssl rand -hex 32`.
      - key: ANALYTICS_SALT
        generateValue: true
      # First-view email notifications — sent to Zoe when a couple opens
      # their portal for the first time. All three must be set to enable.
      # NOTIFY_EMAIL must be a verified SendGrid sender.
      - key: SENDGRID_API_KEY
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      # Public URL of the app — included in first-view notification links.
      # e.g. https://portal.zuzucollective.com
      - key: APP_URL
        sync: false

databases:
  - name: zuzu-portal-db
    plan: free
    databaseName: zuzu_portal
    user: zuzu
